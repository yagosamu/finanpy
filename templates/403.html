<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Acesso negado | Finanpy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake-animation { animation: shake 0.5s ease-in-out; }
    </style>
</head>
<body style="background:#0a0a0a;color:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;">
    <div class="max-w-lg w-full text-center">

        <!-- Icon -->
        <div class="mb-8 flex justify-center shake-animation">
            <div class="w-20 h-20 rounded-full flex items-center justify-center" style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);">
                <svg class="w-10 h-10" style="color:#f59e0b;" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Acesso negado" role="img">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
        </div>

        <!-- Error Code -->
        <p class="text-8xl font-bold font-mono mb-2" style="color:#f59e0b;">403</p>

        <!-- Title -->
        <h1 class="text-xl font-semibold mb-3" style="color:#f5f5f5;">Acesso negado</h1>

        <!-- Message -->
        <p class="text-sm font-light mb-8 max-w-sm mx-auto" style="color:#a3a3a3;">
            Você não tem permissão para acessar esta página.
        </p>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/"
               class="px-6 py-2.5 rounded-lg text-sm font-medium text-black transition-all duration-150 hover:opacity-90"
               style="background:#22c55e;">
                Voltar para o início
            </a>
            <a href="/usuarios/login/"
               class="px-6 py-2.5 rounded-lg text-sm font-medium transition-all duration-150"
               style="background:#111111;color:#a3a3a3;border:1px solid #262626;">
                Fazer login
            </a>
        </div>

        <!-- Footer note -->
        <div class="mt-10 pt-6" style="border-top:1px solid #262626;">
            <p class="text-xs" style="color:#525252;">
                Se você acredita que deveria ter acesso, verifique suas credenciais ou entre em contato com o administrador.
            </p>
        </div>
    </div>
</body>
</html>
