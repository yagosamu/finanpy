<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Erro interno do servidor | Finanpy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .pulse-animation { animation: pulse-glow 2.5s ease-in-out infinite; }
    </style>
</head>
<body style="background:#0a0a0a;color:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;">
    <div class="max-w-lg w-full text-center">

        <!-- Animated Icon -->
        <div class="mb-8 flex justify-center pulse-animation">
            <div class="w-20 h-20 rounded-full flex items-center justify-center" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);">
                <svg class="w-10 h-10" style="color:#ef4444;" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Erro no servidor" role="img">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
        </div>

        <!-- Error Code -->
        <p class="text-8xl font-bold font-mono mb-2" style="color:#ef4444;">500</p>

        <!-- Title -->
        <h1 class="text-xl font-semibold mb-3" style="color:#f5f5f5;">Erro interno do servidor</h1>

        <!-- Message -->
        <p class="text-sm font-light mb-8 max-w-sm mx-auto" style="color:#a3a3a3;">
            Ocorreu um erro inesperado. Nossa equipe foi notificada e está trabalhando para resolver.
        </p>

        <!-- Action -->
        <a href="/"
           class="inline-block px-6 py-2.5 rounded-lg text-sm font-medium text-black transition-all duration-150 hover:opacity-90"
           style="background:#22c55e;">
            Voltar para o início
        </a>

        <!-- Footer note -->
        <div class="mt-10 pt-6" style="border-top:1px solid #262626;">
            <p class="text-xs mb-1" style="color:#525252;">
                Se o problema persistir, tente novamente mais tarde.
            </p>
            <p class="text-xs" style="color:#3d3d3d;">
                Código de erro: 500 - Internal Server Error
            </p>
        </div>
    </div>
</body>
</html>
