<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página não encontrada | Aurum Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .float-animation { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body style="background:#0a0a0a;color:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;">
    <div class="max-w-lg w-full text-center">

        <!-- Animated Icon -->
        <div class="mb-8 flex justify-center float-animation">
            <div class="w-20 h-20 rounded-full flex items-center justify-center" style="background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.15);">
                <svg class="w-10 h-10" style="color:#22c55e;" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Página não encontrada" role="img">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
        </div>

        <!-- Error Code -->
        <p class="text-8xl font-bold font-mono mb-2" style="color:#22c55e;">404</p>

        <!-- Title -->
        <h1 class="text-xl font-semibold mb-3" style="color:#f5f5f5;">Página não encontrada</h1>

        <!-- Message -->
        <p class="text-sm font-light mb-8 max-w-sm mx-auto" style="color:#a3a3a3;">
            A página que você está procurando não existe ou foi movida.
        </p>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/"
               class="px-6 py-2.5 rounded-lg text-sm font-medium text-black transition-all duration-150 hover:opacity-90"
               style="background:#22c55e;">
                Voltar para o início
            </a>
            <a href="/dashboard/"
               class="px-6 py-2.5 rounded-lg text-sm font-medium transition-all duration-150"
               style="background:#111111;color:#a3a3a3;border:1px solid #262626;">
                Ir para o Dashboard
            </a>
        </div>

        <!-- Footer note -->
        <div class="mt-10 pt-6" style="border-top:1px solid #262626;">
            <p class="text-xs" style="color:#525252;">
                Se você acredita que isso é um erro, entre em contato com o suporte.
            </p>
        </div>
    </div>
</body>
</html>
